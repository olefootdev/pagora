<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    PAGORA — Open Graph image (1200x630)

    NOTA: Facebook/Twitter/WhatsApp NÃO renderizam OG SVG nas prévias.
    Converter pra PNG antes de mexer no dominio. Comando rápido:

      npx svgexport public/og-image.svg public/og-image.png 1200:630

    Depois, o link <meta property="og:image" content="/og-image.png" /> em index.html
    vai apontar pro arquivo correto.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1426"/>
      <stop offset="100%" stop-color="#070E1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="rgba(34,227,163,0.22)"/>
      <stop offset="100%" stop-color="rgba(34,227,163,0)"/>
    </radialGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22E3A3"/>
      <stop offset="100%" stop-color="#0FA77A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark — caminhão verde -->
  <g transform="translate(80 80)">
    <rect width="80" height="80" rx="18" fill="#22E3A3"/>
    <g transform="translate(20 22) scale(1.7)" fill="#070E1A">
      <path d="M3 5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v3h3.2c.5 0 1 .25 1.3.65l1.3 1.7c.13.18.2.4.2.6V17a2 2 0 0 1-2 2h-1.2a3 3 0 1 1-5.6 0H10.8a3 3 0 1 1-5.6 0H4a1 1 0 0 1-1-1V5Zm13 5v5h5l-2-3-3-2Z"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="180" y="138" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif"
        font-size="44" font-weight="800" fill="#FFFFFF" letter-spacing="0.04em">PAGORA</text>

  <!-- Eyebrow -->
  <text x="80" y="290" font-family="JetBrains Mono, monospace"
        font-size="22" font-weight="600" fill="#22E3A3" letter-spacing="0.15em">
    MARKETPLACE DE LOGÍSTICA PESADA
  </text>

  <!-- Headline -->
  <text x="80" y="370" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif"
        font-size="68" font-weight="800" fill="#FFFFFF" letter-spacing="-0.025em">
    Frete, guincho e caçamba
  </text>
  <text x="80" y="450" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif"
        font-size="68" font-weight="800" letter-spacing="-0.025em">
    <tspan fill="#FFFFFF">com </tspan><tspan fill="url(#green)">orçamento honesto</tspan><tspan fill="#FFFFFF">.</tspan>
  </text>

  <!-- Subhead -->
  <text x="80" y="520" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif"
        font-size="28" font-weight="500" fill="rgba(255,255,255,0.72)">
    Prestadores verificados respondem em até 2h. Você compara e escolhe.
  </text>

  <!-- Footer chip -->
  <g transform="translate(80 575)">
    <rect width="320" height="36" rx="18" fill="rgba(34,227,163,0.12)" stroke="rgba(34,227,163,0.35)" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#22E3A3"/>
    <text x="36" y="24" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif"
          font-size="15" font-weight="600" fill="#FFFFFF">pagora.com.br · sem taxa ao cliente</text>
  </g>
</svg>
